name: CI - Tests BDD Behave, Selenium & API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

jobs:

  # ── Job 1 : Lint & vérification ────────────────────────────────────────────
  lint:
    name: Lint du code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Installer les dépendances de lint
        run: pip install flake8 black

      - name: Vérifier le formatage (black)
        run: black --check .

      - name: Vérifier le style (flake8)
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=.git,__pycache__,reports,.venv


  # ── Job 2 : Tests API & logique pure (@api) ────────────────────────────────
  # Pas de browser — rapide, tourne sur toutes les PR
  test-api:
    name: Tests API & logique
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Créer le fichier .env
        run: |
          cp .env.example .env
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "HEADLESS=true" >> .env

      - name: Créer les dossiers reports
        run: |
          mkdir -p reports/allure-results
          mkdir -p reports/allure-report
          mkdir -p reports/screenshots

      - name: Lancer les tests Behave @api - Panier
        run: |
          behave features/panier \
            --tags "@api" \
            --format allure_behave.formatter:AllureFormatter \
            --outfile reports/allure-results \
            --format pretty \
            --no-capture \
            --tags "~@skip"
        continue-on-error: true

      - name: Lancer les tests Behave @api - Commande
        run: |
          behave features/commande \
            --tags "@api" \
            --format allure_behave.formatter:AllureFormatter \
            --outfile reports/allure-results \
            --format pretty \
            --no-capture \
            --tags "~@skip"
        continue-on-error: true

      - name: Lancer les tests unitaires (unittest)
        run: |
          python -m unittest discover \
            -s api_tests \
            -p "*.py" \
            -v 2>&1 | tee reports/api-results.txt
        continue-on-error: true

      - name: Upload résultats API
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: reports/api-results.txt
          retention-days: 30

      - name: Upload résultats Allure (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: reports/allure-results/
          retention-days: 30


  # ── Job 3 : Tests UI Selenium (@ui) ───────────────────────────────────────
  # Chrome et Firefox uniquement — Safari nécessite macOS, Edge peu utile en CI
  test-ui:
    name: Tests UI (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Installer Allure CLI
        run: |
          wget -qO- https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # ── Setup Chrome ──
      - name: Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        if: matrix.browser == 'chrome'
        uses: nanasess/setup-chromedriver@v2

      # ── Setup Firefox ──
      - name: Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Setup Geckodriver
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-geckodriver@v1

      - name: Créer le fichier .env
        run: |
          cp .env.example .env
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "BROWSER=${{ matrix.browser }}" >> .env
          echo "HEADLESS=true" >> .env
          echo "JIRA_URL=${{ secrets.JIRA_URL }}" >> .env
          echo "JIRA_TOKEN=${{ secrets.JIRA_TOKEN }}" >> .env
          echo "SQUASH_URL=${{ secrets.SQUASH_URL }}" >> .env
          echo "SQUASH_TOKEN=${{ secrets.SQUASH_TOKEN }}" >> .env

      - name: Créer les dossiers reports
        run: |
          mkdir -p reports/allure-results
          mkdir -p reports/allure-report
          mkdir -p reports/screenshots

      # ── Lancer les tests @ui ──
      - name: Lancer les tests Behave @ui - Homepage
        run: |
          behave features/homepage \
            --tags "@ui" \
            --format allure_behave.formatter:AllureFormatter \
            --outfile reports/allure-results \
            --format pretty \
            --no-capture \
            --tags "~@skip"
        env:
          DISPLAY: ':99'
        continue-on-error: true

      - name: Lancer les tests Behave @ui - Panier
        run: |
          behave features/panier \
            --tags "@ui" \
            --format allure_behave.formatter:AllureFormatter \
            --outfile reports/allure-results \
            --format pretty \
            --no-capture \
            --tags "~@skip"
        env:
          DISPLAY: ':99'
        continue-on-error: true

      - name: Lancer les tests Behave @ui - Commande
        run: |
          behave features/commande \
            --tags "@ui" \
            --format allure_behave.formatter:AllureFormatter \
            --outfile reports/allure-results \
            --format pretty \
            --no-capture \
            --tags "~@skip"
        env:
          DISPLAY: ':99'
        continue-on-error: true

      # ── Générer et uploader le rapport Allure ──
      - name: Générer le rapport Allure
        if: always()
        run: |
          allure generate reports/allure-results \
            --output reports/allure-report \
            --clean

      - name: Upload rapport Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}
          path: reports/allure-report/
          retention-days: 30

      - name: Upload screenshots (échecs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: reports/screenshots/
          retention-days: 15
          if-no-files-found: ignore

      # ── Notifier Jira/Squash (seulement sur main) ──
      - name: Reporter vers Jira
        if: always() && github.ref == 'refs/heads/main'
        run: python utils/jira_reporter.py
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        continue-on-error: true

      - name: Reporter vers Squash
        if: always() && github.ref == 'refs/heads/main'
        run: python utils/squash_reporter.py
        env:
          SQUASH_URL: ${{ secrets.SQUASH_URL }}
          SQUASH_TOKEN: ${{ secrets.SQUASH_TOKEN }}
        continue-on-error: true

      - name: Résumé des tests
        if: always()
        run: |
          echo "## 📊 Résultats des tests UI" >> $GITHUB_STEP_SUMMARY
          echo "| Navigateur | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.browser }} | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY


  # ── Job 4 : Publication Allure sur GitHub Pages (main uniquement) ──────────
  publish-report:
    name: Publier rapport Allure
    runs-on: ubuntu-latest
    needs: [test-api, test-ui]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Télécharger rapport Allure (Chrome)
        uses: actions/download-artifact@v4
        with:
          name: allure-report-chrome
          path: allure-report/
        continue-on-error: true

      - name: Publier sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report/
          destination_dir: allure
